<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lakecia — Full Design Shotgun</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: #0a0a0f;
            color: #f1f5f9;
            line-height: 1.6;
        }
        .shotgun-nav {
            position: fixed;
            top: 0; left: 0; right: 0;
            background: rgba(10, 10, 15, 0.95);
            backdrop-filter: blur(20px);
            border-bottom: 1px solid #1e293b;
            padding: 16px 24px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            z-index: 1000;
        }
        .shotgun-nav h1 {
            font-size: 1.1rem;
            font-weight: 700;
        }
        .shotgun-nav h1 span {
            background: linear-gradient(135deg, #a78bfa, #f472b6);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
        .variant-tabs {
            display: flex;
            gap: 8px;
        }
        .variant-tab {
            padding: 8px 16px;
            border-radius: 8px;
            font-size: 0.85rem;
            font-weight: 600;
            cursor: pointer;
            border: 1px solid #1e293b;
            background: transparent;
            color: #64748b;
            transition: all 0.2s;
        }
        .variant-tab:hover {
            border-color: #334155;
            color: #94a3b8;
        }
        .variant-tab.active {
            background: linear-gradient(135deg, #7c3aed, #db2777);
            border-color: transparent;
            color: white;
        }
        .variant-frame {
            display: none;
            width: 100%;
            height: calc(100vh - 60px);
            border: none;
            margin-top: 60px;
        }
        .variant-frame.active {
            display: block;
        }
        .pick-bar {
            position: fixed;
            bottom: 0; left: 0; right: 0;
            background: rgba(10, 10, 15, 0.95);
            backdrop-filter: blur(20px);
            border-top: 1px solid #1e293b;
            padding: 16px 24px;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 16px;
            z-index: 1000;
        }
        .pick-bar span {
            color: #64748b;
            font-size: 0.9rem;
        }
        .pick-btn {
            padding: 10px 20px;
            border-radius: 8px;
            font-weight: 600;
            font-size: 0.9rem;
            cursor: pointer;
            border: none;
            transition: all 0.2s;
        }
        .pick-btn.v1 { background: #3b82f6; color: white; }
        .pick-btn.v2 { background: #8b5cf6; color: white; }
        .pick-btn.v3 { background: #ec4899; color: white; }
        .pick-btn:hover { transform: translateY(-2px); opacity: 0.9; }
    </style>
</head>
<body>
    <nav class="shotgun-nav">
        <h1>🎨 <span>Lakecia</span> Design Shotgun</h1>
        <div class="variant-tabs">
            <button class="variant-tab active" onclick="showVariant('v1')">Authority</button>
            <button class="variant-tab" onclick="showVariant('v2')">Emotion</button>
            <button class="variant-tab" onclick="showVariant('v3')">Funnel</button>
        </div>
    </nav>

    <iframe id="v1" class="variant-frame active" src="variant-authority.html"></iframe>
    <iframe id="v2" class="variant-frame" src="variant-emotion.html"></iframe>
    <iframe id="v3" class="variant-frame" src="variant-funnel.html"></iframe>

    <div class="pick-bar">
        <span>Pick a variant to implement:</span>
        <button class="pick-btn v1" onclick="alert('Variant 1: Authority — Tell me to build this')">Pick Authority</button>
        <button class="pick-btn v2" onclick="alert('Variant 2: Emotion — Tell me to build this')">Pick Emotion</button>
        <button class="pick-btn v3" onclick="alert('Variant 3: Funnel — Tell me to build this')">Pick Funnel</button>
    </div>

    <script>
        function showVariant(id) {
            document.querySelectorAll('.variant-frame').forEach(f => f.classList.remove('active'));
            document.querySelectorAll('.variant-tab').forEach(t => t.classList.remove('active'));
            document.getElementById(id).classList.add('active');
            event.target.classList.add('active');
        }
    </script>
</body>
</html>
